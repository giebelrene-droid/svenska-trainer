<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SprachTutor AI</title>
    <link rel="stylesheet" href="style.css?v=29.2">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="toastContainer"></div>

    <div class="top-bar">
        <div class="app-title">SprachTutor AI</div>
    </div>

    <div class="nav-scroll">
        <button id="btn1" onclick="showTab('add')">➕ Wort</button>
        <button id="btnFlash" onclick="showTab('flashcards')">📇 Karten</button>
        <button id="btn5" onclick="showTab('study')">👀 Lernen</button>
        <button id="btnRoleplay" onclick="showTab('roleplay')">🗣️ Szenarien</button>
        <button id="btnAudio" onclick="showTab('audio')">🎧 Audio</button>
        <button id="btn8" onclick="showTab('chat')">💬 Tutor</button>
        <button id="btn7" onclick="showTab('live')">🎙️ Live</button>
        <button id="btn3" onclick="showTab('list')">📚 Liste</button>
        <button id="btnArcade" onclick="showTab('arcade')">🎮 Spiele</button>
    </div>

    <div id="tabAdd" class="card"></div>
    <div id="tabFlashcards" class="card" style="display:none"></div>
    <div id="tabStudy" class="card" style="display:none"></div>
    <div id="tabRoleplay" class="card" style="display:none"></div>
    <div id="tabAudio" class="card" style="display:none">
        <h2>🎧 Audio-Trainer</h2>
        <div id="audioDisplayL1"></div><div id="audioDisplayL3"></div>
        <button id="btnStartAudio" onclick="toggleAudioTrainer()">▶️ Starten</button>
    </div>
    <div id="tabChat" class="card" style="display:none"></div>
    <div id="tabLive" class="card" style="display:none"></div>
    <div id="tabList" class="card" style="display:none"></div>
    <div id="tabArcade" class="card" style="display:none"></div>

    <script src="app.js?v=29.2"></script>
</body>
</html>

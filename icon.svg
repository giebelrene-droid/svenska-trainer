<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1424"/>
      <stop offset="100%" stop-color="#1a0f2e"/>
    </linearGradient>
    <!-- Shared horizontal gradient across full width (color-consistent for all elements) -->
    <linearGradient id="hGrad" x1="88" y1="0" x2="424" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Diagonal gradient for glow/decoration -->
    <linearGradient id="dGrad" x1="88" y1="80" x2="424" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <!-- Radial background glow -->
    <radialGradient id="bgGlow" cx="256" cy="240" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <!-- Glow filter for ST text -->
    <filter id="textGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22d3ee" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle center radial glow -->
  <ellipse cx="256" cy="235" rx="230" ry="210" fill="url(#bgGlow)"/>

  <!-- Top accent line -->
  <rect x="88" y="82" width="336" height="2.5" rx="1.25" fill="url(#hGrad)" opacity="0.45"/>

  <!-- ST monogram — main element -->
  <text
    x="256" y="312"
    font-family="'SF Pro Display','Helvetica Neue','Arial Black','Impact',sans-serif"
    font-size="258"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-12"
    fill="url(#hGrad)"
    filter="url(#textGlow)">ST</text>

  <!-- AI pill badge -->
  <rect x="197" y="338" width="118" height="34" rx="9" fill="url(#dGrad)" opacity="0.12"/>
  <rect x="197" y="338" width="118" height="34" rx="9" fill="none"
        stroke="url(#hGrad)" stroke-width="1.5" opacity="0.55"/>
  <text
    x="256" y="362"
    font-family="'SF Pro Display','Helvetica Neue','Arial',sans-serif"
    font-size="17"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="7"
    fill="url(#hGrad)"
    opacity="0.90">AI</text>

  <!-- Bottom accent line -->
  <rect x="88" y="414" width="336" height="2.5" rx="1.25" fill="url(#hGrad)" opacity="0.45"/>
</svg>
